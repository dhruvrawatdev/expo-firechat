version: "3.9"

services:
  expo:
    build: .
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/app
      - /app/node_modules
    command: npx expo start --tunnel

  firebase:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: npx firebase emulators:start
    ports:
      - "4000:4000"
      - "8080:8080"
      - "9099:9099"
